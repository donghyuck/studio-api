logging:
  level:
    root: info
    jdk : error
    studio.one: trace
    studio.server: trace
    org: info
    org.springframework.boot.context.properties: DEBUG
    org.springframework.boot.context.properties.bind: DEBUG
    org.springframework.boot.autoconfigure: ERROR
    org.springframework.security: trace
    org.springframework.security.web.FilterChainProxy: TRACE
    org.springframework.security.authentication.ProviderManager: TRACE
    org.hibernate: ERROR
    dev.langchain4j: DEBUG 
spring:
  application:
    name: studio-api
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    sql-migration-prefix: V 
    repeatable-sql-migration-prefix: R
    sql-migration-separator: __
    sql-migration-suffixes: .sql
    locations:
      - classpath:/schema/data/postgres
      - classpath:/schema/objecttype/postgres
      - classpath:/schema/user/postgres
      - classpath:/schema/security/postgres
      - classpath:/schema/security-acl/postgres
      - classpath:/schema/ai/postgres
      - classpath:/schema/avatar/postgres
      - classpath:/schema/attachment/postgres
      - classpath:/schema/template/postgres
      - classpath:/schema/mail/postgres
    # MySQL 사용 시에는 아래처럼 `/postgres`를 `/mysql`로 바꿔서 사용한다.
    # locations:
    #   - classpath:/schema/data/mysql
    #   - classpath:/schema/objecttype/mysql
    out-of-order: true
  ### JPA Config ###
  jpa:
    # database-platform: org.hibernate.dialect.MySQLInnoDBDialect, org.hibernate.dialect.MySQL8Dialect
    # database-platform: org.hibernate.dialect.PostgreSQLDialect, org.hibernate.dialect.PostgreSQL10Dialect
    database-platform: org.hibernate.dialect.PostgreSQL10Dialect
    show-sql: false
    properties:
      hibernate:
        default_schema: studioapi
        format_sql: true
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  ### DATASOURCE Config ###
  datasource:
    primary:
      url: jdbc:log4jdbc:postgresql://localhost:5432/cufit_db
      driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
      username: ${SPRING_DATASOURCE_USERNAME:studioapi}
      password: ${SPRING_DATASOURCE_PASSWORD:}
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        minimum-idle: 5 # 최소 유휴 커넥션 수
        maximum-pool-size: 5 # 커넥션 풀 최대 크기 (일반 웹서비스 기준)
        idle-timeout: 600000 # 커넥션 유휴 종료 시간 (10분, 단위: ms)
        max-lifetime: 1800000 # 커넥션 최대 수명 (30분, 단위: ms)
        connection-timeout: 30000 # 커넥션 획득 timeout (30초)
        pool-name: PrimaryHikariCP # 풀 이름 지정
        auto-commit: false # 자동 커밋 여부
  mail:
    host: api.mail.bizbee.co.kr
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.debug: true
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true  
  servlet:
    multipart:
      max-file-size: 50MB      # 업로드 1개 파일 최대 크기
      max-request-size: 200MB  # 요청 전체(여러 파일 합) 최대 크기
      file-size-threshold: 0   # 0이면 디스크로 바로 저장(메모리에 안 쌓음)      
management:
  endpoints:
    web:
      exposure:
        include: mappings # 또는 "*"
studio:
  banner-mode: off
  env:
    log:
      enabled: false
      print-values: false
  persistence:
    type: jpa
    jpa:
      enabled: true
      print-entities: true
      auditing:
        enabled: true
        clock:
          zone-id: "Asia/Seoul" # 감사 시간대(기본: UTC)
        auditor:
          strategy: security # security | header | fixed | composite
          header: "X-Actor" # strategy=header일 때 추출할 헤더 이름
          fixed: "system" # strategy=fixed일 때 고정 주체
          composite: # strategy=composite일 때 우선순위
            - security
            - header
            - fixed
        fallback:
          pre-persist: true # @PrePersist 기본값 보강
          pre-update: true # @PreUpdate 기본값 보강 
  i18n:
    # resources:   # ← 비워두면 자동 스캔
    #   - classpath:i18n/*/messages
    #   - classpath:META-INF/i18n/user/messages
    encoding: UTF-8
    cache-seconds: -1
    use-code-as-default-message: true
    fallback-to-system-locale: false
  features:
    application-properties:
      enabled: true
      persistence: jpa
    user:
      enabled: true
      persistence: jpa
      web:
        base-path: /api/mgmt
        endpoints:
          user: { enabled: true }
          group: { enabled: true }
          role: { enabled: true }
          company: { enabled: true }
    avatar-image:
      enabled: true
      persistence: jdbc
      web:
        user-base: /api/mgmt/users
        public-base: /api/profile
      replica:
        base-dir: var/lib/app/avatars
        ensure-dirs: true
        cleanup:
          enabled: true
          cron: 0 0 3 * * *
          ttlDays: 30
    jasypt:
      enabled: true
      encryptor:
        bean: components:foundation:jasypt-string-encryptor
        password: ${JASYPT_ENCRYPTOR_PASSWORD} # 환경 변수로 암호화 비밀번호 설정
        algorithm: "PBEWithSHA256And128BitAES-CBC-BC" # Bouncy Castle 알고리즘 사용
        providerName: "BC" # Bouncy Castle 프로바이더 지정
        key-obtention-iterations: ${JASYPT_KEY_OBTENTION_ITERATIONS:100000}
        pool-size: 1
        salt-generator-classname: "org.jasypt.salt.RandomSaltGenerator"
        string-output-type: "base64"
      http:
        enabled: false # 개발 시에도 기본 비활성화, 명시적으로만 활성화
        base-path: /internal/jasypt
        require-token: true
        token-env: JASYPT_HTTP_TOKEN
    attachment:
      enabled: true
      persistence: jpa 
      storage:
        baseDir: /Users/donghyuck.son/Documents/file
      web:
        enabled: true
        base-path: /api/mgmt/files  
    text:
      enabled: true    
    template:
      enabled: true  
    mail: 
      enabled: true
      imap:
        host: api.mail.bizbee.co.kr
        port: 993
        username: ${STUDIO_MAIL_IMAP_USERNAME:}
        password: ${STUDIO_MAIL_IMAP_PASSWORD:}
        protocol: imaps        # 기본 imaps
        folder: helpdesk  #INBOX
        max-messages: 500
        concurrency: 4         # 동시 처리 스레드 수
        max-attachment-bytes: 10485760  # 10MB 초과 첨부는 저장하지 않음
        max-body-bytes: 1048576         # 본문은 길이 제한으로 자름
      web:
        enabled: true
        notify: stomp
        stomp-destination: /mail-sync
        base-path: /api/mgmt/mail
    realtime:
      enabled: true    
  realtime:
    stomp:
      enabled: true
      endpoint: /ws
      app-destination-prefix: /app
      topic-prefix: /topic
      user-prefix: /user 
      allowed-origins:           # CORS 허용 오리진
        - "http://localhost:3000"
        - "http://192.168.0.156:3000" 
      sock-js: false              # SockJS fallback 사용 여부
      jwt-enabled: false         # JwtDecoder 사용 시 true
      redis-enabled: false       # Redis Pub/Sub 사용 시 true
      redis-channel: studio:realtime:events
  ai:
    enabled: true
    prompts:
      query-rewrite: "classpath:prompts/query-rewrite.v1.prompt"
      summarization: "classpath:prompts/summarization.v1.prompt"
      keyword-extraction: "classpath:prompts/keyword-extraction.v1.prompt"
      rag-cleaner: "classpath:prompts/rag-cleaner.v1.prompt" 
    pipeline:
      chunk-size: 350
      chunk-overlap : 50  
    endpoints:
      enabled: true  
    default-provider: google-ai-gemini
    providers :  
      google-ai-gemini:
        enabled: true
        type: google_ai_gemini
        api-key: ${GOOGLE_AI_GEMINI_API_KEY:}
        chat:
          enabled: true 
          model: gemini-2.0-flash
        embedding:
          enabled: true
          model: text-embedding-004   
      google-ai-gemini-pro:
        enabled: true
        type: google_ai_gemini
        api-key: ${GOOGLE_AI_GEMINI_PRO_API_KEY:${GOOGLE_AI_GEMINI_API_KEY:}}
        chat:
          enabled: true 
          model: gemini-2.5-pro              
  cloud:
    storage: 
      web:
        enabled: true
        endpoint: /api/mgmt/objectstorage
      providers:
        aws_openhi:
          type: s3
          enabled: true
          #region: asia-pacific
          #endpoint: https://s3.asia-pacific.amazonaws.com
          credentials:
            access-key: ${AWS_OPENHI_ACCESS_KEY:}
            secret-key: ${AWS_OPENHI_SECRET_KEY:}
          s3:
            path-style: true
            presigner-enabled: true  
        naver_edupure:
          type: s3
          enabled: true
          region: kr-standard
          endpoint: https://kr.object.ncloudstorage.com 
          credentials:
            access-key: ${NAVER_EDUPURE_ACCESS_KEY:}
            secret-key: ${NAVER_EDUPURE_SECRET_KEY:}
          s3:
            path-style: true
            presigner-enabled: true  
        naver_cufit:
          type: s3
          enabled: true
          region: kr-standard
          endpoint: https://kr.object.ncloudstorage.com 
          credentials:
            access-key: ${NAVER_CUFIT_ACCESS_KEY:}
            secret-key: ${NAVER_CUFIT_SECRET_KEY:}
          s3:
            path-style: true
            presigner-enabled: true              
        oci:
          enabled: false
          namespace-name:
          compartment-id:
  security:
    enabled: true
    default-roles:
      - ROLE_USER
    auth:
      lock:  
        enabled: true 
        persistence: jpa
        maxAttempts: 5
        lockDuration: 5m
      password-reset:
        enabled: true
        reset-password-url: /password-reset 
        web: 
          enabled: true 
          base-path: /api/auth/password-reset  
    audit:
      login-failure:
        enabled: false
        persistence: jpa
        web:
          enabled: true 
    acl:
        enabled: true     
        defaults: 
          enabled: true
        sync:
          enabled: true
        web: 
          enabled: true 
          base-path: /api/security/acl
    password-encoder:
      algorithm: bcrypt # bcrypt, sha256, pbkdf2
    jwt:
      enabled: true
      persistence: jdbc
      secret: ${STUDIO_JWT_SECRET}
      access-ttl: 30m
      refresh-ttl: 35m
      issuer: www.greentogether.go.kr
      header: Authorization
      prefix: Bearer
      claim-authorities: authorities
      endpoints:
        login-enabled: true
        refresh-enabled: true
        base-path: /api/auth
      permit:
        - /api/auth/**
      fail-if-missing: true
    cors: 
      allowed-origins:
        - "http://localhost:3000"
        - "http://192.168.0.156:3000" 
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
      allowed-headers:
        - Authorization
        - Content-Type
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age: 3600
    permit:
      permit-all:
        - /
        - /index.html
        - /api/auth/**
        - /api/profile/*/avatar*
        - /actuator/**  
        - /ws/**
      role:
        USER:
